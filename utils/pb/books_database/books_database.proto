syntax = "proto3";

package books_database;

service BooksDatabase {
    rpc Read (ReadRequest) returns (ReadResponse);
    rpc Write (WriteRequest) returns (WriteResponse);
    rpc ReserveStock (ReserveStockRequest) returns (ReserveStockResponse);
    rpc PropagateWrite (PropagateWriteRequest) returns (WriteResponse);
    // 2PC operations for stock reservations
    rpc PrepareOrder (PrepareOrderRequest) returns (PrepareOrderResponse);
    rpc CommitOrder (CommitOrderRequest) returns (CommitOrderResponse);
    rpc AbortOrder (AbortOrderRequest) returns (AbortOrderResponse);
}

message ReadRequest {
    string title = 1;
}

message ReadResponse {
    int32 stock = 1;
}

message WriteRequest {
    string title = 1;
    int32 new_stock = 2;
}

message WriteResponse {
    bool success = 1;
    string error = 2;
}

message ReserveStockRequest {
    string title = 1;
    int32 quantity = 2;
}

message ReserveStockResponse {
    bool success = 1;
    int32 remaining_stock = 2;
    string error = 3;
}

message PropagateWriteRequest {
    string title = 1;
    int32 new_stock = 2;
}

message PrepareOrderRequest {
    string order_id = 1;
    repeated ReserveStockRequest items = 2;
}

message PrepareOrderResponse {
    bool is_ok = 1;
    repeated string errors = 2;
}

message CommitOrderRequest {
    string order_id = 1;
}

message CommitOrderResponse {
    bool is_ok = 1;
    repeated string errors = 2;
}

message AbortOrderRequest {
    string order_id = 1;
}

message AbortOrderResponse {
    bool is_ok = 1;
    repeated string errors = 2;
}
