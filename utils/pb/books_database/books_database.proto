syntax = "proto3";

package books_database;

service BooksDatabase {
    rpc Read (ReadRequest) returns (ReadResponse);
    rpc Write (WriteRequest) returns (WriteResponse);
    rpc ReserveStock (ReserveStockRequest) returns (ReserveStockResponse);
    rpc PropagateWrite (PropagateWriteRequest) returns (WriteResponse);
}

message ReadRequest {
    string title = 1;
}

message ReadResponse {
    int32 stock = 1;
}

message WriteRequest {
    string title = 1;
    int32 new_stock = 2;
}

message WriteResponse {
    bool success = 1;
    string error = 2;
}

message ReserveStockRequest {
    string title = 1;
    int32 quantity = 2;
}

message ReserveStockResponse {
    bool success = 1;
    int32 remaining_stock = 2;
    string error = 3;
}

message PropagateWriteRequest {
    string title = 1;
    int32 new_stock = 2;
}
