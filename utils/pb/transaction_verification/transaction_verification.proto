syntax = "proto3";

package transaction_verification;

service TransactionVerificationService {
    rpc InitOrder(InitOrderRequest) returns (InitOrderResponse);
    
    rpc VerifyItems(StepRequest) returns (StepResponse);
    rpc VerifyUserData(StepRequest) returns (StepResponse);
    rpc VerifyCardFormat(StepRequest) returns (StepResponse);
}

message InitOrderRequest {
  string order_id = 1;
  OrderData order_data = 2;
}

message InitOrderResponse {
  bool is_ok = 1;
  repeated string errors = 2;
}

message StepRequest {
  string order_id = 1;
  repeated int32 vc = 2;
}

message StepResponse {
  bool is_valid = 1;
  repeated int32 vc = 2;
  repeated string errors = 3;
}

message OrderData {
  User user = 1;
  CreditCard credit_card = 2;
  string user_comment = 3;
  repeated Item items = 4;
  Address billing_address = 5;
  string shipping_method = 6;
  bool gift_wrapping = 7;
  bool terms_accepted = 8;
}

message User {
  string name = 1;
  string contact = 2;
}

message Item {
  string name = 1;
  int32 quantity = 2;
}

message CreditCard {
  string number = 1;
  string expiration_date = 2;
  string cvv = 3;
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string zip = 4;
  string country = 5;
}
